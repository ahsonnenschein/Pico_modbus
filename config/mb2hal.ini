# MB2HAL Configuration for Pico Modbus TCP Server
# LinuxCNC Modbus-to-HAL Interface
#
# Usage:
#   1. Copy this file to your LinuxCNC configuration directory
#   2. Replace <PICO_IP> with the actual IP address of your Pico
#      (shown on USB serial when Pico boots)
#   3. Add to your HAL file:
#      loadusr -W mb2hal config=mb2hal.ini
#
# Created HAL pins:
#   - mb2hal.pico_adc.0.float through .3.float  (ADC inputs 0-4095)
#   - mb2hal.pico_din.0.bit through .7.bit      (Digital inputs)
#   - mb2hal.pico_dout.0.bit through .7.bit     (Digital outputs)

[MB2HAL_INIT]
# Total number of transactions
TOTAL_TRANSACTIONS = 3

# Debug level (0=none, 1=errors, 2=transactions, 3=all)
# Set to 2 or 3 during initial testing
DEBUG = 1

# -------------------------------------------------------------------
# TRANSACTION 00: Read ADC Values (Holding Registers 0-3)
# -------------------------------------------------------------------
# Reads 4 x 16-bit ADC values (12-bit resolution, 0-4095)
# Mapped to Modbus holding registers 0-3

[TRANSACTION_00]
LINK_TYPE = tcp
TCP_IP = 192.168.1.121
TCP_PORT = 502
MB_SLAVE_ID = 1
FIRST_ELEMENT = 0
NELEMENTS = 4
MAX_UPDATE_RATE = 100.0
MB_TX_CODE = fnct_03_read_holding_registers
HAL_TX_NAME = pico_adc
# Optional: Scale ADC values to voltage (3.3V reference)
# HAL_FLOAT_SCALE_0 = 0.000806  # 3.3V / 4096

# -------------------------------------------------------------------
# TRANSACTION 01: Read Digital Inputs (Discrete Inputs 0-7)
# -------------------------------------------------------------------
# Reads 8 digital inputs from GP0-GP7
# Active-high logic with internal pull-ups (low = active/triggered)

[TRANSACTION_01]
LINK_TYPE = tcp
TCP_IP = 192.168.1.121
TCP_PORT = 502
MB_SLAVE_ID = 1
FIRST_ELEMENT = 0
NELEMENTS = 8
MAX_UPDATE_RATE = 100.0
MB_TX_CODE = fnct_02_read_discrete_inputs
HAL_TX_NAME = pico_din

# -------------------------------------------------------------------
# TRANSACTION 02: Write Digital Outputs (Multiple Coils 0-7)
# -------------------------------------------------------------------
# Writes 8 digital outputs to GP8-GP15
# Use this for controlling relays, indicators, etc.

[TRANSACTION_02]
LINK_TYPE = tcp
TCP_IP = 192.168.1.121
TCP_PORT = 502
MB_SLAVE_ID = 1
FIRST_ELEMENT = 0
NELEMENTS = 8
MAX_UPDATE_RATE = 100.0
MB_TX_CODE = fnct_15_write_multiple_coils
HAL_TX_NAME = pico_dout

# -------------------------------------------------------------------
# Example HAL connections for Wire EDM:
# -------------------------------------------------------------------
#
# In your custom.hal or postgui.hal file:
#
# # Connect ADC inputs (example: voltage/current sensing)
# net wire-voltage   <= mb2hal.pico_adc.0.float
# net wire-current   <= mb2hal.pico_adc.1.float
# net tank-level     <= mb2hal.pico_adc.2.float
# net spare-adc      <= mb2hal.pico_adc.3.float
#
# # Connect digital inputs (example: limit switches, sensors)
# net x-limit        <= mb2hal.pico_din.0.bit
# net y-limit        <= mb2hal.pico_din.1.bit
# net z-limit        <= mb2hal.pico_din.2.bit
# net wire-break     <= mb2hal.pico_din.3.bit
# net door-open      <= mb2hal.pico_din.4.bit
# net e-stop-ext     <= mb2hal.pico_din.5.bit
# net tank-full      <= mb2hal.pico_din.6.bit
# net spare-in       <= mb2hal.pico_din.7.bit
#
# # Connect digital outputs (example: relays, indicators)
# net pump-enable    => mb2hal.pico_dout.0.bit
# net flush-valve    => mb2hal.pico_dout.1.bit
# net wire-feed      => mb2hal.pico_dout.2.bit
# net spark-enable   => mb2hal.pico_dout.3.bit
# net indicator-1    => mb2hal.pico_dout.4.bit
# net indicator-2    => mb2hal.pico_dout.5.bit
# net spare-out-1    => mb2hal.pico_dout.6.bit
# net spare-out-2    => mb2hal.pico_dout.7.bit
